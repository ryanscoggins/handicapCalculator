<div class="stack">
  <h1>Scramble Pairing</h1>
  <p style="color: #666;">Input player names and handicaps, then click "Create Teams" to generate 3 even matchups.</p>

  <div class="player-list">
    <div class="inputRow tournament-row">
      <input type="text" pInputText [(ngModel)]="golfer1.name" placeholder="Player 1" (ngModelChange)="inputChange()"/>
      <p-inputNumber [(ngModel)]="golfer1.handicap" [maxFractionDigits]="1" (ngModelChange)="inputChange()"></p-inputNumber>
    </div>
    <div class="inputRow tournament-row">
      <input type="text" pInputText [(ngModel)]="golfer2.name" placeholder="Player 2" (ngModelChange)="inputChange()"/>
      <p-inputNumber [(ngModel)]="golfer2.handicap" [maxFractionDigits]="1" (ngModelChange)="inputChange()"></p-inputNumber>
    </div>
    <div class="inputRow tournament-row">
      <input type="text" pInputText [(ngModel)]="golfer3.name" placeholder="Player 3" (ngModelChange)="inputChange()"/>
      <p-inputNumber [(ngModel)]="golfer3.handicap" [maxFractionDigits]="1" (ngModelChange)="inputChange()"></p-inputNumber>
    </div>
    <div class="inputRow tournament-row">
      <input type="text" pInputText [(ngModel)]="golfer4.name" placeholder="Player 4" (ngModelChange)="inputChange()"/>
      <p-inputNumber [(ngModel)]="golfer4.handicap" [maxFractionDigits]="1" (ngModelChange)="inputChange()"></p-inputNumber>
    </div>
  </div>

  <div class="center-div" style="padding-top: 1rem;">
    <p-button icon="pi pi-flag" label="Create Teams" [disabled]="showMatchups" (onClick)="createTeams(); calculateTeamHandicap()"></p-button>
  </div>

  <div *ngIf="showMatchups" style="padding-top: 1.5rem;">
    <app-matchup [matchups]="matchups"></app-matchup>
  </div>
</div>
